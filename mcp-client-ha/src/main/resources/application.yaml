spring:
  application:
    name: mcp-client-ha
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2:3b
          temperature: 0.7
          top-p: 0.9
          num-predict: 2048
    mcp:
      client:
        sse:
          connections:
            ha:
              url: http://localhost:8080
server:
  port: 8081

logging:
  level:
    io.modelcontextprotocol.spec.McpClientSession: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG

